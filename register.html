<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Register — STACKLY Construction</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="/favicon.ico">
</head>

<body>
    <div class="auth-shell">
        <div class="auth-side">
            <div>
                <a href="./home.html" class="nav-logo"><img src="./images/logo-dark-themed.webp" alt="STACKLY"
                        style="height:60px"></a>
                <a href="./home.html" class="auth-back" style="margin-top:2rem"><i class="fa-solid fa-arrow-left"></i>
                    Back to Home</a>
            </div>
            <div class="quote">"Join a community of builders shaping the future."<br><span
                    style="font-size:1rem;color:#fff;opacity:.7;font-family:var(--font-body);margin-top:1rem;display:block">—
                    Welcome to Stackly</span></div>
        </div>
        <div class="auth-form-wrap">
            <div class="auth-card">
                <h1>Create Account</h1>
                <p class="sub">Start your Stackly journey</p>
                <form id="registerForm">
                    <div class="field"><label>Role</label>
                        <select id="role" required>
                            <option value="">Select role…</option>
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div class="field"><label>Full Name</label><input id="name" required></div>
                    <div class="field"><label>Email</label><input id="email" type="email" required></div>
                    <div class="field"><label>Password</label><input id="password" type="password" required></div>
                    <div class="error" id="err"></div>
                    <button class="btn" type="submit"
                        style="width:100%;justify-content:center"><span>Register</span></button>
                </form>
                <p class="auth-alt">Already have an account? <a href="./login.html">Sign in</a></p>
            </div>
        </div>
    </div>
    <script src="./js/auth.js"></script>
</body>

</html>
