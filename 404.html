<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>404 — Not Found | STACKLY</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .err-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--orange);
            border-radius: 50%;
            opacity: .6;
            animation: float 6s infinite
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(30px, -40px)
            }
        }

        .err-code {
            position: relative;
            display: inline-block
        }

        .err-code::before,
        .err-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, var(--orange), #c94a00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: .7
        }

        .err-code::before {
            animation: glitch 2s infinite;
            color: #ff3b3b;
            -webkit-text-fill-color: #ff3b3b;
            mix-blend-mode: screen
        }

        .err-code::after {
            animation: glitch 2.5s infinite reverse;
            color: #3bffef;
            -webkit-text-fill-color: #3bffef;
            mix-blend-mode: screen
        }
    </style>
</head>

<body>
    <div class="err-wrap">
        <div class="err-particle" style="top:20%;left:15%"></div>
        <div class="err-particle" style="top:60%;left:80%;animation-delay:1s"></div>
        <div class="err-particle" style="top:30%;left:70%;animation-delay:2s"></div>
        <div class="err-particle" style="top:75%;left:20%;animation-delay:3s"></div>
        <div class="err-particle" style="top:15%;left:60%;animation-delay:1.5s"></div>
        <div>
            <div class="err-code">404</div>
            <h2>Under Construction</h2>
            <p>Looks like this page hit a foundation crack. Our crew is on it — but you can head back to safe ground.
            </p>
            <div class="err-actions">
                <a href="./home.html" class="btn"><i class="fa-solid fa-house"></i> <span>Back to Home</span></a>
                <a href="javascript:history.back()" class="btn ghost"><i class="fa-solid fa-arrow-left"></i> <span>Go
                        Back</span></a>
            </div>
        </div>
        <i class="fa-solid fa-helmet-safety err-crane" style="font-size:200px;color:var(--orange)"></i>
    </div>
</body>

</html>
